syntax = "proto2";

package railway;

// import "nanopb.proto";

enum DeviceType
{
    Train = 0;
    Turnout = 1;
}

enum Function
{
    Default = 0;
    Music = 1;
}

message Device {
    required string id = 1;
    required DeviceType type = 2;
    repeated Function Functions = 3;
}

message ControlUnit {
    required string id = 1;
    repeated Device device = 2;
}

